name: Deploy Comic Store

on:
  push:
    branches: [main]
    paths:
      - "comic store/**"
      - ".github/workflows/deploy-comic-store.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./comic store

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
